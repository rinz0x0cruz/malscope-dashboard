name: Deploy dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build static site
        run: npm run generate
        env:
          NUXT_APP_BASE_URL: /malscope-dashboard/ # project page: rinz0x0cruz.github.io/malscope-dashboard/

      - uses: actions/upload-pages-artifact@v5
        with:
          path: .output/public

      - id: deploy
        uses: actions/deploy-pages@v5
